name: Build Windows

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache MAUI workload
        id: cache-maui-workload
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\dotnet\sdk-manifests
            C:\Program Files\dotnet\packs
            C:\Program Files\dotnet\metadata
          key: maui-workload-${{ runner.os }}-${{ env.DOTNET_VERSION }}-v1
          restore-keys: |
            maui-workload-${{ runner.os }}-${{ env.DOTNET_VERSION }}-

      - name: Install MAUI workload
        if: steps.cache-maui-workload.outputs.cache-hit != 'true'
        run: dotnet workload install maui --ignore-failed-sources

      - name: Restore dependencies
        run: dotnet restore "MauiApp bareiron viewer/MauiApp bareiron viewer.csproj"

      - name: Publish Windows
        run: dotnet publish "MauiApp bareiron viewer/MauiApp bareiron viewer.csproj" -f net10.0-windows10.0.19041.0 -c Release

      - name: List build outputs
        run: |
          Get-ChildItem -Recurse "MauiApp bareiron viewer/bin" | Select-Object FullName
        shell: pwsh

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: 'MauiApp bareiron viewer/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish/*.msix'
          retention-days: 14
        if: hashFiles('MauiApp bareiron viewer/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish/*.msix') != ''

      - name: Upload Windows (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: 'MauiApp bareiron viewer/bin/Release/net10.0-windows10.0.19041.0/win-x64/*.msix'
          retention-days: 1
        if: hashFiles('MauiApp bareiron viewer/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish/*.msix') == ''
